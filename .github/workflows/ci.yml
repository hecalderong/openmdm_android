name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-frontend-tests:
    name: Backend + Frontend (containers)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backend/frontend tests in dedicated test stack
        run: ./test-mdm.sh

  android-unit-tests:
    name: Android (unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest
