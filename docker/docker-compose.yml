version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: openmdm_android_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openmdm_android}
      POSTGRES_USER: ${POSTGRES_USER:-mdm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdm_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mdm_network

  redis:
    image: redis:7-alpine
    container_name: openmdm_android_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mdm_network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: openmdm_android_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-mdm_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-mdm_password}
      DATABASE_NAME: ${POSTGRES_DB:-openmdm_android}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      JWT_EXPIRATION: 24h
      PORT: 3000
      NODE_ENV: development
      CORS_ORIGIN: "*"
    volumes:
      - ../backend/uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - mdm_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: openmdm_android_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - mdm_network

  backend-tests:
    build:
      context: ../backend
      dockerfile: Dockerfile.test
    profiles: ["test"]
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-mdm_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-mdm_password}
      DATABASE_NAME: ${POSTGRES_DB:-openmdm_android}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      JWT_EXPIRATION: 24h
      PORT: 3000
      NODE_ENV: test
      CORS_ORIGIN: "*"
    depends_on:
      - postgres
      - redis
    networks:
      - mdm_network

  frontend-tests:
    build:
      context: ../frontend
      dockerfile: Dockerfile.test
    profiles: ["test"]
    command: ["npm", "run", "test"]
    networks:
      - mdm_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mdm_network:
    driver: bridge
